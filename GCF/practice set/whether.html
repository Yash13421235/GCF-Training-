<!DOCTYPE html>
<html>

<head>
    <title>Modern Weather App</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg: linear-gradient(135deg, #74b9ff, #0984e3);
            --text: white;
            --card: rgba(255, 255, 255, 0.2);
            --primary: #00cec9;
            --secondary: #fdcb6e;
            --danger: #e17055;
        }

        body.dark {
            --bg: linear-gradient(135deg, #2d3436, #000000);
            --text: #dfe6e9;
            --card: rgba(255, 255, 255, 0.05);
            --primary: #00cec9;
            --secondary: #fdcb6e;
            --danger: #e17055;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            transition: all 0.5s ease;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Weather-specific backgrounds */
        body.sunny {
            --bg: linear-gradient(135deg, #f6d365, #fda085);
        }
        
        body.cloudy {
            --bg: linear-gradient(135deg, #bdc3c7, #2c3e50);
        }
        
        body.rainy {
            --bg: linear-gradient(135deg, #4facfe, #00f2fe);
        }
        
        body.stormy {
            --bg: linear-gradient(135deg, #1e3c72, #2a5298);
        }
        
        body.snowy {
            --bg: linear-gradient(135deg, #e0eafc, #cfdef3);
        }

        .header {
            width: 100%;
            padding: 20px;
            text-align: center;
            position: relative;
        }

        h1 {
            font-size: 2.5rem;
            margin: 0;
            text-shadow: 0 2px 10px rgba(0,0,0,0.2);
            font-weight: 300;
        }

        .toggle {
            position: absolute;
            top: 20px;
            right: 20px;
            cursor: pointer;
            font-size: 1.5rem;
            background: var(--card);
            width: 50px;
            height: 50px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(10px);
            transition: all 0.3s ease;
        }

        .toggle:hover {
            transform: scale(1.1);
            background: rgba(255, 255, 255, 0.3);
        }

        .container {
            width: 100%;
            max-width: 600px;
            padding: 0 20px;
            margin-top: 20px;
        }

        .search-box {
            display: flex;
            margin-bottom: 30px;
            background: var(--card);
            border-radius: 50px;
            overflow: hidden;
            backdrop-filter: blur(10px);
            box-shadow: 0 8px 32px rgba(0,0,0,0.1);
        }

        input {
            flex: 1;
            padding: 15px 25px;
            border: none;
            background: transparent;
            color: var(--text);
            font-size: 1.1rem;
            outline: none;
        }

        input::placeholder {
            color: rgba(255,255,255,0.7);
        }

        button {
            padding: 15px 25px;
            background: var(--primary);
            border: none;
            cursor: pointer;
            color: white;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        button:hover {
            background: #00a29b;
            transform: translateY(-2px);
        }

        .weather-container {
            position: relative;
            width: 100%;
            padding: 30px;
            background: var(--card);
            border-radius: 20px;
            backdrop-filter: blur(10px);
            box-shadow: 0 8px 32px rgba(0,0,0,0.1);
            min-height: 400px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transform: translateY(20px);
            transition: all 0.5s ease;
        }

        .weather-container.show {
            opacity: 1;
            transform: translateY(0);
        }

        .weather-icon {
            font-size: 5rem;
            margin-bottom: 20px;
            text-shadow: 0 0 20px rgba(255,255,255,0.5);
        }

        .temperature {
            font-size: 4rem;
            font-weight: 300;
            margin: 10px 0;
        }

        .description {
            font-size: 1.5rem;
            text-transform: capitalize;
            margin-bottom: 30px;
            opacity: 0.9;
        }

        .weather-details {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            width: 100%;
            margin-top: 20px;
        }

        .detail-box {
            background: rgba(255,255,255,0.1);
            padding: 15px;
            border-radius: 15px;
            text-align: center;
            backdrop-filter: blur(5px);
        }

        .detail-box i {
            font-size: 1.5rem;
            margin-bottom: 10px;
            color: var(--secondary);
        }

        .detail-label {
            font-size: 0.9rem;
            opacity: 0.8;
            margin-bottom: 5px;
        }

        .detail-value {
            font-size: 1.2rem;
            font-weight: 600;
        }

        .loading {
            display: none;
            font-size: 2rem;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .error {
            color: var(--danger);
            font-size: 1.2rem;
            text-align: center;
            padding: 20px;
            background: rgba(255,255,255,0.1);
            border-radius: 15px;
            backdrop-filter: blur(5px);
        }

        .location-info {
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 20px;
            font-size: 1.2rem;
        }

        .location-info i {
            margin-right: 10px;
            color: var(--secondary);
        }

        /* Responsive design */
        @media (max-width: 768px) {
            h1 {
                font-size: 2rem;
            }
            
            .weather-details {
                grid-template-columns: 1fr;
            }
            
            .temperature {
                font-size: 3rem;
            }
            
            .weather-icon {
                font-size: 4rem;
            }
        }
    </style>
</head>

<body>
    <div class="header">
        <h1>Weather Forecast</h1>
        <div class="toggle" onclick="toggleMode()">
            <i class="fas fa-moon"></i>
        </div>
    </div>

    <div class="container">
        <div class="search-box">
            <input type="text" id="cityInput" placeholder="Enter city name..." onkeypress="handleKeyPress(event)">
            <button onclick="getWeather()">
                <i class="fas fa-search"></i> Search
            </button>
        </div>

        <div id="weatherContainer" class="weather-container">
            <div class="loading" id="loading">
                <i class="fas fa-spinner"></i>
            </div>
            <div id="weatherContent">
                <!-- Weather content will be inserted here -->
            </div>
        </div>
    </div>

    <script>
        const apiKey = "fb10b1c39ec1b49d1d2e55d41b4a1511";
        const weatherIcons = {
            "01d": "fas fa-sun",
            "01n": "fas fa-moon",
            "02d": "fas fa-cloud-sun",
            "02n": "fas fa-cloud-moon",
            "03d": "fas fa-cloud",
            "03n": "fas fa-cloud",
            "04d": "fas fa-cloud",
            "04n": "fas fa-cloud",
            "09d": "fas fa-cloud-showers-heavy",
            "09n": "fas fa-cloud-showers-heavy",
            "10d": "fas fa-cloud-sun-rain",
            "10n": "fas fa-cloud-moon-rain",
            "11d": "fas fa-bolt",
            "11n": "fas fa-bolt",
            "13d": "fas fa-snowflake",
            "13n": "fas fa-snowflake",
            "50d": "fas fa-smog",
            "50n": "fas fa-smog"
        };

        function toggleMode() {
            document.body.classList.toggle("dark");
            const icon = document.querySelector('.toggle i');
            icon.classList.toggle('fa-moon');
            icon.classList.toggle('fa-sun');
            
            if (document.body.classList.contains("dark")) {
                localStorage.setItem("theme", "dark");
            } else {
                localStorage.setItem("theme", "light");
            }
        }

        window.onload = () => {
            const saved = localStorage.getItem("theme");
            if (saved === "dark") {
                document.body.classList.add("dark");
                document.querySelector('.toggle i').classList.remove('fa-moon');
                document.querySelector('.toggle i').classList.add('fa-sun');
            }
            
            // Get user's location
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(
                    position => {
                        const lat = position.coords.latitude;
                        const lon = position.coords.longitude;
                        getWeatherByCoords(lat, lon);
                    },
                    error => {
                        console.error("Geolocation error:", error);
                    }
                );
            }
        }

        function handleKeyPress(event) {
            if (event.key === "Enter") {
                getWeather();
            }
        }

        function getWeatherByCoords(lat, lon) {
            const url = `https://api.openweathermap.org/data/2.5/weather?lat=${lat}&lon=${lon}&appid=${apiKey}&units=metric`;
            fetchWeatherData(url);
        }

        async function getWeather() {
            const city = document.getElementById("cityInput").value.trim();
            if (!city) {
                showError("Please enter a city name");
                return;
            }

            const url = `https://api.openweathermap.org/data/2.5/weather?q=${city}&appid=${apiKey}&units=metric`;
            fetchWeatherData(url);
        }

        async function fetchWeatherData(url) {
            const container = document.getElementById('weatherContainer');
            const loading = document.getElementById('loading');
            const content = document.getElementById('weatherContent');
            
            container.classList.remove('show');
            content.innerHTML = '';
            loading.style.display = 'block';

            try {
                const res = await fetch(url);
                const data = await res.json();

                if (data.cod !== 200) {
                    showError(data.message || "City not found");
                    return;
                }

                displayWeather(data);
                setWeatherBackground(data.weather[0].icon);
                loading.style.display = 'none';
                container.classList.add('show');

            } catch (err) {
                showError("Network error. Please try again later.");
                loading.style.display = 'none';
            }
        }

        function displayWeather(data) {
            const content = document.getElementById('weatherContent');
            const iconCode = data.weather[0].icon;
            const iconClass = weatherIcons[iconCode] || "fas fa-cloud";
            
            content.innerHTML = `
                <div class="location-info">
                    <i class="fas fa-map-marker-alt"></i>
                    <span>${data.name}, ${data.sys.country}</span>
                </div>
                
                <div class="weather-icon">
                    <i class="${iconClass}"></i>
                </div>
                
                <div class="temperature">${Math.round(data.main.temp)}°C</div>
                <div class="description">${data.weather[0].description}</div>
                
                <div class="weather-details">
                    <div class="detail-box">
                        <i class="fas fa-tint"></i>
                        <div class="detail-label">Humidity</div>
                        <div class="detail-value">${data.main.humidity}%</div>
                    </div>
                    <div class="detail-box">
                        <i class="fas fa-wind"></i>
                        <div class="detail-label">Wind</div>
                        <div class="detail-value">${data.wind.speed} m/s</div>
                    </div>
                    <div class="detail-box">
                        <i class="fas fa-thermometer-half"></i>
                        <div class="detail-label">Feels Like</div>
                        <div class="detail-value">${Math.round(data.main.feels_like)}°C</div>
                    </div>
                    <div class="detail-box">
                        <i class="fas fa-compress-arrows-alt"></i>
                        <div class="detail-label">Pressure</div>
                        <div class="detail-value">${data.main.pressure} hPa</div>
                    </div>
                    <div class="detail-box">
                        <i class="fas fa-eye"></i>
                        <div class="detail-label">Visibility</div>
                        <div class="detail-value">${(data.visibility / 1000).toFixed(1)} km</div>
                    </div>
                    <div class="detail-box">
                        <i class="fas fa-sun"></i>
                        <div class="detail-label">UV Index</div>
                        <div class="detail-value">Low</div>
                    </div>
                </div>
            `;
        }

        function setWeatherBackground(iconCode) {
            // Remove all weather-specific classes
            document.body.classList.remove('sunny', 'cloudy', 'rainy', 'stormy', 'snowy');
            
            // Set background based on weather condition
            if (iconCode.includes('01')) { // Clear sky
                document.body.classList.add('sunny');
            } else if (iconCode.includes('02') || iconCode.includes('03') || iconCode.includes('04')) { // Clouds
                document.body.classList.add('cloudy');
            } else if (iconCode.includes('09') || iconCode.includes('10')) { // Rain
                document.body.classList.add('rainy');
            } else if (iconCode.includes('11')) { // Thunderstorm
                document.body.classList.add('stormy');
            } else if (iconCode.includes('13')) { // Snow
                document.body.classList.add('snowy');
            }
        }

        function showError(message) {
            const content = document.getElementById('weatherContent');
            content.innerHTML = `<div class="error"><i class="fas fa-exclamation-circle"></i> ${message}</div>`;
            document.getElementById('weatherContainer').classList.add('show');
        }
    </script>
</body>
</html>
